<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Quest</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app-container">
        
        <header class="game-header">
            <div class="meta-stats">
                <div class="streak-tracker">
                    <span class="stat-label">WEEKLY STREAK</span>
                    <div class="streak-dots">
                        <div class="dot active">S</div>
                        <div class="dot active">M</div>
                        <div class="dot active">T</div>
                        <div class="dot active">W</div>
                        <div class="dot">T</div>
                        <div class="dot">F</div>
                        <div class="dot">S</div>
                    </div>
                </div>
                
                <div class="shield-inventory">
                    <span class="stat-label">SHIELDS</span>
                    <div class="shield-icons">
                        <span class="shield active">🛡️</span>
                        <span class="shield active">🛡️</span>
                        <span class="shield broken">⚠️</span>
                    </div>
                </div>
            </div>

            <div class="daily-status">
                <div class="progress-container">
                    <span class="stat-label">DAILY QUESTS</span>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: 60%;"></div>
                    </div>
                </div>
                
                <div class="gem-counter">
                    <span class="gem-icon">💎</span>
                    <span id="total-gems">0</span>
                </div>
            </div>
        </header>

        <div class="character-stage">
            <img src="spyro.gif" alt="Spyro" id="spyro-character" onerror="this.style.display='none'">
            <div id="sparx-sprite" class="floating-sparx"></div>
        </div>

        <main id="quest-log">
            <h2 class="section-title">Active Realms</h2>
            <div id="loading">Loading realms...</div>
            <ul id="task-list"></ul>
        </main>

        <div id="celebration-popup" class="hidden">
            <h1 class="popup-title">QUEST CLEARED!</h1>
            <div class="popup-gems">+<span id="popup-amount">0</span> GEMS</div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
